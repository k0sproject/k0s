apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: order-test-hook-role
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
