name: "Build :: k0s"

on:
  workflow_call:
    inputs:
      target-os:
        type: string
        required: true
        description: The OS to build k0s for (linux or windows).
      target-arch:
        type: string
        required: true
        description: The architecture to build k0s for.

env:
  MAKEFLAGS: -j

jobs:
  build:
    name: ${{ inputs.target-os }}-${{ inputs.target-arch }}
    runs-on: >-
      ${{
        case(
          inputs.target-arch == 'arm', fromJSON('["self-hosted", "linux", "arm"]'),
          inputs.target-arch == 'arm64', 'ubuntu-24.04-arm',
          inputs.target-arch == 'riscv64', 'ubuntu-24.04-riscv',
          'ubuntu-24.04'
        )
      }}

    env:
      TARGET_OS: ${{ inputs.target-os }}
      TARGET_ARCH: ${{ inputs.target-arch }}

    steps:
      - name: Set up Docker Context for Buildx
        if: inputs.target-arch == 'arm'
        run: docker context create builders

      - name: Set up Docker Buildx
        if: inputs.target-arch == 'arm'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          endpoint: builders

      - name: "Build :: Checkout"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # for `git describe`
          persist-credentials: false

      - name: "Build :: Reclaim runner disk space"
        if: inputs.target-arch != 'arm'
        run: .github/workflows/reclaim-runner-disk-space.bash

      - name: "Build :: Prepare"
        id: build-prepare
        run: |
          .github/workflows/prepare-build-env.sh

          executableSuffix=''
          if [ "$TARGET_OS" = windows ]; then
            executableSuffix=.exe
          fi
          echo executable-suffix="$executableSuffix" >>"$GITHUB_OUTPUT"

      - name: "Cache :: embedded binaries"
        id: cache-embedded-bins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          key: "build-k0s-${{ inputs.target-os }}-${{ inputs.target-arch }}-embedded-bins-${{ hashFiles('embedded-bins/**/*') }}"
          path: embedded-bins/staging/${{ inputs.target-os }}/bin/

      - name: "Cache :: Go cache"
        id: cache-gocache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          key: "build-k0s-${{ inputs.target-os }}-${{ inputs.target-arch }}-gocache-go${{ env.GO_VERSION }}-${{ github.sha }}"
          restore-keys: "build-k0s-${{ inputs.target-os }}-${{ inputs.target-arch }}-gocache-go${{ env.GO_VERSION }}-"
          path: build/cache/go/build

      - name: "Cache :: Go cache :: Prepare"
        if: steps.cache-gocache.outputs.cache-hit
        run: |
          touch -t "$(TZ=UTC+24 date +%Y%m%d%H%M.%S)" build/cache/_cache_sentinel
          find build/cache/go/build -type f \( -name '*-a' -o -name '*-d' \) -exec touch -r build/cache/_cache_sentinel {} +

      - name: "Build :: k0s"
        env:
          EMBEDDED_BINS_CACHED: "${{ steps.cache-embedded-bins.outputs.cache-hit }}"
        run: |
          make .k0sbuild.docker-image.k0s
          touch go.sum
          if [ "$EMBEDDED_BINS_CACHED" == true ]; then
            make --touch ".bins.$TARGET_OS.stamp"
          fi
          make --touch codegen
          make build
          echo "k0s${{ steps.build-prepare.outputs.executable-suffix }} binary size: **$(du -sh k0s${{ steps.build-prepare.outputs.executable-suffix }} | cut -f1)**" >>$GITHUB_STEP_SUMMARY

      - name: "Upload :: k0s"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: k0s-${{ inputs.target-os }}-${{ inputs.target-arch }}
          path: |
            k0s${{ steps.build-prepare.outputs.executable-suffix }}

      - name: "Build :: SBOM"
        run: make spdx.json

      - name: "Upload :: SBOM"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: sbom-${{ inputs.target-os }}-${{ inputs.target-arch }}
          path: spdx.json

      - name: "Build :: Airgap image list"
        id: build-airgap-image-list
        env:
          TARGET_OS: ${{ inputs.target-os }}
          TARGET_ARCH: ${{ inputs.target-arch }}
        run: |
          target=$TARGET_OS-$TARGET_ARCH
          if [ $TARGET_OS = windows ]; then
            target=windows2022-$TARGET_ARCH
          fi
          target=airgap-images-$target.txt
          make $target && cat $target
          echo file-name="$target" >>"$GITHUB_OUTPUT"

      - name: "Upload :: Airgap image list"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ steps.build-airgap-image-list.outputs.file-name }}
          path: ${{ steps.build-airgap-image-list.outputs.file-name }}

      - name: "Build :: IPv6 test image list"
        id: build-ipv6-test-image-list
        if: inputs.target-os == 'linux' && (inputs.target-arch == 'amd64' || inputs.target-arch == 'arm64')
        env:
          TARGET_OS: ${{ inputs.target-os }}
          TARGET_ARCH: ${{ inputs.target-arch }}
        run: |
          target=ipv6-test-images-$TARGET_OS-$TARGET_ARCH.txt
          make $target && cat $target
          echo file-name="$target" >>"$GITHUB_OUTPUT"

      - name: "Upload :: IPv6 test image list"
        if: steps.build-ipv6-test-image-list.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ steps.build-ipv6-test-image-list.outputs.file-name }}
          path: ${{ steps.build-ipv6-test-image-list.outputs.file-name }}

      - name: "Cache :: Go cache :: Trim"
        if: steps.cache-gocache.outputs.cache-hit
        run: |
          find build/cache/go/build -type f \( -name '*-a' -o -name '*-d' \) -not -newer build/cache/_cache_sentinel -delete
